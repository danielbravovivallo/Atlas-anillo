<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas CD · Resoluciones Columna-Diamante</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
:root {
  --bg:        #0e0e10;
  --panel:     #18181b;
  --panel-2:   #1f1f23;
  --border:    #2a2a2e;
  --text:      #d9d9dc;
  --text-muted:#8a8a90;
  --accent:    #c1a878;
  --CDuno:     #6e6cc9;
  --CDdos:     #c1440e;
  --CDtres:    #4ea27a;
  --CDcuatro:  #cfa033;
  --CDcinco:   #a673c1;
  --CDseis:    #6ec0c9;
  --CDgris:    #5a5a5e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'EB Garamond', serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

header {
  padding: 0.85rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}
header h1 { font-weight: 500; font-size: 1.4rem; letter-spacing: 0.02em; }
header h1 em { font-style: italic; color: var(--accent); }
header .subtitle { font-size: 0.86rem; color: var(--text-muted); font-style: italic; }

.layout {
  display: grid;
  grid-template-columns: 340px 1fr 380px;
  height: calc(100% - 56px);
}

/* ───────── PANEL IZQUIERDO ───────── */
#meta {
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 1.2rem 1.1rem;
}
#meta .empty { color: var(--text-muted); font-style: italic; margin-top: 2rem; font-size: 0.95rem; }

.card-title {
  font-size: 1.25rem;
  font-weight: 500;
  margin-bottom: 0.3rem;
  letter-spacing: 0.01em;
  line-height: 1.25;
}
.card-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  color: var(--text-muted);
  margin-bottom: 0.9rem;
}

/* segmented toggles */
.toggle-row {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
}
.toggle-row .label {
  color: var(--text-muted);
  letter-spacing: 0.04em;
  min-width: 70px;
}
.seg {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  background: var(--panel-2);
}
.seg button {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  padding: 0.28rem 0.55rem;
  cursor: pointer;
  border-right: 1px solid var(--border);
}
.seg button:last-child { border-right: none; }
.seg button.active {
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
}
.seg button:hover:not(.active) { color: var(--text); background: #25252a; }

.kv {
  display: grid;
  grid-template-columns: 70px 1fr;
  row-gap: 0.3rem;
  font-size: 0.92rem;
  margin-top: 0.9rem;
}
.kv .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
  padding-top: 0.1rem;
}
.kv .v code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--accent);
}

.section { margin-top: 1.1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
.section h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.betti-row {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.84rem;
  color: var(--text);
  background: var(--panel-2);
  padding: 0.45rem 0.6rem;
  border-radius: 3px;
  overflow-x: auto;
  white-space: nowrap;
}

.neighbors { display: flex; flex-direction: column; gap: 0.2rem; }
.neighbor {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  padding: 0.3rem 0.45rem;
  background: var(--panel-2);
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.12s ease;
}
.neighbor:hover { border-color: var(--accent); }
.neighbor .nid {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--accent);
}
.neighbor .nmeta { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }

/* ───────── PANEL CENTRAL ───────── */
#stage {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.stage-toolbar {
  padding: 0.55rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 1rem;
  align-items: center;
  font-size: 0.78rem;
  background: var(--panel);
}
.stage-toolbar .module-label {
  font-family: 'EB Garamond', serif;
  font-size: 1.05rem;
  font-style: italic;
  color: var(--text);
}
.stage-toolbar .right { margin-left: auto; display: flex; gap: 0.7rem; align-items: center; }

#diag-area {
  flex: 1;
  overflow: auto;
  padding: 1.2rem;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
#diag-area svg { background: transparent; }

#mats-area {
  border-top: 1px solid var(--border);
  background: var(--panel);
  max-height: 35%;
  display: none;
  flex-direction: column;
}
#mats-area.open { display: flex; }
.mats-header {
  padding: 0.5rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
}
.mats-body {
  overflow: auto;
  padding: 0.7rem 1rem 1rem;
}
.matrix-block {
  background: var(--panel-2);
  padding: 0.55rem 0.75rem;
  border-radius: 3px;
  margin-bottom: 0.6rem;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
}
.matrix-block .mlabel { color: var(--text-muted); font-size: 0.7rem; margin-bottom: 0.3rem; }
.matrix-block table { border-collapse: collapse; }
.matrix-block td {
  padding: 0.12rem 0.6rem;
  text-align: center;
  color: var(--text);
  border-left: 1px dashed #2a2a2e;
}
.matrix-block tr td:first-child { border-left: none; }

/* ───────── PANEL DERECHO (mapa) ───────── */
#map-wrap {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
.map-toolbar {
  padding: 0.55rem 0.7rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  align-items: center;
  font-size: 0.74rem;
  flex-wrap: wrap;
  background: var(--panel);
}
.map-toolbar label {
  display: flex; align-items: center; gap: 0.3rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
}
.map-toolbar select {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.18rem 0.4rem;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
}
.map-stat { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-size: 0.7rem; }
#cy { flex: 1; background: var(--bg); }

.legend {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  font-size: 0.68rem;
  font-family: 'JetBrains Mono', monospace;
  padding: 0.4rem 0.7rem;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.legend-item { display: inline-flex; align-items: center; gap: 0.25rem; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* matrix-term colors (set inline via varColor) */
.mterm { font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>Atlas <em>CD</em></h1>
  <span class="subtitle">cartas de resoluciones Columna–Diamante</span>
</header>

<div class="layout">

  <!-- ───────── METADATA (izquierda) ───────── -->
  <div id="meta">
    <div class="empty">Selecciona una carta del mapa para ver su resolución.</div>
  </div>

  <!-- ───────── STAGE (centro) ───────── -->
  <div id="stage">
    <div class="stage-toolbar">
      <span class="module-label" id="module-label">—</span>
      <div class="right">
        <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.72rem">orientación</span>
        <div class="seg" id="seg-orient">
          <button data-v="horizontal" class="active">→</button>
          <button data-v="vertical">↑</button>
        </div>
        <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.72rem">|</span>
        <button id="btn-mats" class="seg" style="border-radius:3px;padding:0.28rem 0.7rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.72rem;background:var(--panel-2);border:1px solid var(--border);cursor:pointer">
          mostrar diferenciales
        </button>
      </div>
    </div>
    <div id="diag-area">
      <div style="color:var(--text-muted);font-style:italic;margin-top:3rem">El diagrama aparecerá aquí.</div>
    </div>
    <div id="mats-area">
      <div class="mats-header">
        <span>Diferenciales · términos coloreados por variable</span>
        <button id="btn-mats-close" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.7rem">cerrar</button>
      </div>
      <div class="mats-body" id="mats-body"></div>
    </div>
  </div>

  <!-- ───────── MAPA (derecha) ───────── -->
  <div id="map-wrap">
    <div class="map-toolbar">
      <label>n<select id="filter-n">
        <option value="all">·</option>
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option>
      </select></label>
      <label>|I|<select id="filter-gens">
        <option value="all">·</option>
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option>
      </select></label>
      <label>fam<select id="filter-family">
        <option value="all">·</option>
        <option value="free">free</option>
        <option value="squares-only">squares-only</option>
        <option value="fan-at-x1">fan-at-x1</option>
        <option value="fan">fan</option>
        <option value="path-like">path-like</option>
        <option value="mixed">mixed</option>
      </select></label>
      <span class="map-stat" id="stat"></span>
    </div>
    <div id="cy"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--CDuno)"></span>fan-at-x1</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--CDdos)"></span>fan</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--CDtres)"></span>path-like</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--CDcuatro)"></span>squares-only</span>
      <span class="legend-item"><span class="legend-dot" style="background:#888"></span>mixed</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--CDgris)"></span>free</span>
    </div>
  </div>

</div>

<script>
/* ===== CD-CORE INLINE ===== */
/*
 * cd-core.js — Column-Diamond core algorithm (sign-corrected).
 *
 * No DOM, no SVG, no rendering. Pure data manipulation.
 * Works both in Node (CommonJS) and the browser (window.CDCore).
 *
 * SIGN-ASSIGNMENT FIX (two phases):
 *
 *   Phase 1 (structure, over F_2):
 *     Build, per new node, the set of edges (toP, idx) without signs.
 *     Contributions (one per column, one per diamond) are grouped via
 *     union-find when they share at least one edge.
 *
 *   Phase 2 (signs, BFS on the per-node coupling forest):
 *     Each diamond imposes a sign constraint between its two edges:
 *         s(eA) * sgnA + s(eB) * sgnB = 0
 *       i.e. s(eB) = -sgnA*sgnB * s(eA).
 *     Per group: for each connected component of the coupling graph,
 *     anchor one edge at +1 and propagate by BFS. If a cycle is found,
 *     verify consistency (it always closes for well-formed CD inputs;
 *     the coupling graph is a forest in every example tested).
 */

'use strict';

function buildCD({ n, relations, initVars, levels }) {
  // ----- helpers -----
  const inI = new Set(relations.map(([a, b]) => `${Math.min(a, b)},${Math.max(a, b)}`));
  const isInI = (a, b) => inI.has(`${Math.min(a, b)},${Math.max(a, b)}`);

  // ----- state -----
  const nodes = [];       // nodes[g] = [{id, g, p}, ...]
  const arrows = [];      // {fromG, fromP, toG, toP, idx, sign}
  let nodeId = 0;
  const mkNode = (g, p) => ({ id: nodeId++, g, p });

  // Degree 0: single node.
  nodes[0] = [mkNode(0, 0)];
  // Degree 1: one node per initial variable, all pointing to node 0.
  nodes[1] = initVars.map((_, p) => mkNode(1, p));
  for (let p = 0; p < initVars.length; p++) {
    arrows.push({ fromG: 1, fromP: p, toG: 0, toP: 0, idx: initVars[p], sign: 1 });
  }

  for (let g = 1; g < levels - 1; g++) extendDiagram(g);

  function extendDiagram(g) {
    const currentArrows = arrows.filter(a => a.fromG === g && a.toG === g - 1);

    // Each contribution: { edges: [{toP,idx}], couples: [{eA, eB, sgnA, sgnB}] }
    const contribs = new Map();

    // -------- COLUMNS --------
    // For every arrow (fromP=p)--xi-->(toP=q) and every j with xi*xj ∈ I,
    // a column adds a fresh node with ONE edge (new --xj--> p).
    for (const arr of currentArrows) {
      const i = arr.idx, p = arr.fromP;
      for (let j = 1; j <= n; j++) {
        if (isInI(i, j)) {
          const key = `col,${p},${j}`;
          if (!contribs.has(key)) {
            contribs.set(key, { edges: [{ toP: p, idx: j }], couples: [] });
          }
        }
      }
    }

    // -------- DIAMONDS --------
    // For every w in degree g-1 with multiple incoming arrows, form
    // diamond completions for each pair (arrA, arrB) with sigA,sigB indices
    // satisfying x_{idxA} * x_{idxB} ∉ I, idxA != idxB, pA != pB.
    for (const w of nodes[g - 1]) {
      const arrowsToW = currentArrows.filter(a => a.toP === w.p);
      const byOrigin = new Map();
      for (const arr of arrowsToW) {
        if (!byOrigin.has(arr.fromP)) byOrigin.set(arr.fromP, arr);
      }
      const repArr = [...byOrigin.values()].sort((a, b) => a.idx - b.idx);

      for (let a = 0; a < repArr.length; a++) {
        for (let b = a + 1; b < repArr.length; b++) {
          const arrA = repArr[a], arrB = repArr[b];
          const idxA = arrA.idx, idxB = arrB.idx;
          const sgnA = arrA.sign, sgnB = arrB.sign;
          const pA = arrA.fromP, pB = arrB.fromP;
          if (pA === pB || idxA === idxB) continue;
          if (isInI(idxA, idxB)) continue;

          const key = `diam,${w.p},${pA},${pB}`;
          if (!contribs.has(key)) {
            const eA = { toP: pA, idx: idxB };  // upper-left edge of the diamond
            const eB = { toP: pB, idx: idxA };  // upper-right edge of the diamond
            contribs.set(key, {
              edges: [eA, eB],
              // s(eA)*sgnA + s(eB)*sgnB = 0  =>  s(eB) = -sgnA*sgnB * s(eA)
              couples: [{ eA, eB, sgnA, sgnB }]
            });
          }
        }
      }
    }

    // -------- PHASE 1: union-find over the contribution incidence (F_2 structure)
    const contribList = [...contribs.values()];
    const parent = contribList.map((_, i) => i);
    const find = x => parent[x] === x ? x : (parent[x] = find(parent[x]));
    const union = (x, y) => { parent[find(x)] = find(y); };

    const edgeOwner = new Map(); // "toP,idx" -> first contrib index seen
    for (let i = 0; i < contribList.length; i++) {
      for (const e of contribList[i].edges) {
        const k = `${e.toP},${e.idx}`;
        if (edgeOwner.has(k)) union(i, edgeOwner.get(k));
        else edgeOwner.set(k, i);
      }
    }

    // Aggregate by group: unique edge set + all couplings of the group.
    const groups = new Map(); // root -> { edges: Map(key->edge), couples: [...] }
    for (let i = 0; i < contribList.length; i++) {
      const root = find(i);
      if (!groups.has(root)) groups.set(root, { edges: new Map(), couples: [] });
      const gr = groups.get(root);
      for (const e of contribList[i].edges) {
        const k = `${e.toP},${e.idx}`;
        if (!gr.edges.has(k)) gr.edges.set(k, e);
      }
      for (const c of contribList[i].couples) gr.couples.push(c);
    }

    // -------- PHASE 2: per-group BFS sign propagation
    const newLevel = [];
    nodes[g + 1] = newLevel;
    let pos = 0;

    for (const [, grp] of groups) {
      const edgeKeys = [...grp.edges.keys()];
      const signs = new Map();

      // adjacency: edgeKey -> [{to: edgeKey, factor: ±1}]
      const adj = new Map();
      for (const k of edgeKeys) adj.set(k, []);
      for (const c of grp.couples) {
        const kA = `${c.eA.toP},${c.eA.idx}`;
        const kB = `${c.eB.toP},${c.eB.idx}`;
        const f = -c.sgnA * c.sgnB;     // s(kB) = f * s(kA)
        adj.get(kA).push({ to: kB, factor: f });
        adj.get(kB).push({ to: kA, factor: f });
      }

      for (const k0 of edgeKeys) {
        if (signs.has(k0)) continue;
        signs.set(k0, 1);
        const queue = [k0];
        while (queue.length) {
          const u = queue.shift();
          for (const { to, factor } of adj.get(u)) {
            const want = factor * signs.get(u);
            if (signs.has(to)) {
              if (signs.get(to) !== want) {
                throw new Error(
                  `CD sign inconsistency at level g=${g}, edge ${to} ` +
                  `(want ${want}, have ${signs.get(to)})`
                );
              }
            } else {
              signs.set(to, want);
              queue.push(to);
            }
          }
        }
      }

      // Materialize the new node and its arrows.
      const newNode = mkNode(g + 1, pos);
      newLevel.push(newNode);
      for (const k of edgeKeys) {
        const e = grp.edges.get(k);
        arrows.push({
          fromG: g + 1, fromP: pos,
          toG: g,       toP: e.toP,
          idx: e.idx,
          sign: signs.get(k)
        });
      }
      pos++;
    }

    // If there were no contributions, F_{g+1} = 0 and the resolution
    // terminates here. No ghost node is created.
  }

  return { nodes, arrows, n, initVars, levels, relations };
}

// ---------------------------------------------------------------
// Symbolic matrices d_g : F_g -> F_{g-1}.
// M[i][j] is a list of monomial terms {idx, sign} that, summed, give
// the (i,j) entry. Two terms with the same idx are summed combinatorially.
function buildMatrices(cd) {
  const { nodes, arrows, levels } = cd;
  const mats = [];
  for (let g = 1; g < levels; g++) {
    if (!nodes[g] || !nodes[g - 1]) { mats.push(null); continue; }
    const rows = nodes[g - 1].length;
    const cols = nodes[g].length;
    const M = Array.from({ length: rows }, () =>
      Array.from({ length: cols }, () => []));
    for (const a of arrows) {
      if (a.fromG === g && a.toG === g - 1) {
        M[a.toP][a.fromP].push({ idx: a.idx, sign: a.sign });
      }
    }
    // Combine like terms by idx.
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const sums = new Map();
        for (const t of M[i][j]) sums.set(t.idx, (sums.get(t.idx) || 0) + t.sign);
        M[i][j] = [...sums.entries()]
          .filter(([, s]) => s !== 0)
          .map(([idx, sign]) => ({ idx, sign }));
      }
    }
    mats.push(M);
  }
  return mats;
}

function bettiNumbers(cd) {
  return cd.nodes.map(l => l ? l.length : 0);
}

// ---------------------------------------------------------------
// Verifies d_g ∘ d_{g+1} = 0 in R = k[x]/I, for every g.
// Two composable arrows ptop --x_i--> q --x_j--> pbot contribute
// sign(top)*sign(bot) * x_i*x_j. If x_i*x_j ∈ I, the term vanishes
// in R; otherwise it accumulates into the {i,j}-monomial coefficient.
// Cancellation requires the total coefficient to be zero for every
// surviving monomial and every (ptop, pbot) pair.
function verifyDdEqualsZero(cd) {
  const { arrows, nodes, levels, relations } = cd;
  const inI = new Set(relations.map(([a, b]) => `${Math.min(a, b)},${Math.max(a, b)}`));
  const isInI = (a, b) => inI.has(`${Math.min(a, b)},${Math.max(a, b)}`);

  const violations = [];
  for (let g = 1; g < levels - 1; g++) {
    const top = nodes[g + 1] || [];
    const bot = nodes[g - 1] || [];
    const upByOrigin = new Map();
    for (const a of arrows) if (a.fromG === g + 1) {
      if (!upByOrigin.has(a.fromP)) upByOrigin.set(a.fromP, []);
      upByOrigin.get(a.fromP).push(a);
    }

<script>
// ============ Atlas v2 ============

const FAMILY_COLOR = {
  'fan-at-x1':    '#6e6cc9',
  'fan':          '#c1440e',
  'path-like':    '#4ea27a',
  'squares-only': '#cfa033',
  'mixed':        '#888',
  'free':         '#5a5a5e'
};
const VAR_COLORS = ['#6e6cc9','#c1440e','#4ea27a','#cfa033','#a673c1','#6ec0c9','#d97777','#a0a0a0'];
const varColor = i => VAR_COLORS[(i-1) % VAR_COLORS.length];

const atlas = __ATLAS;
let cy = null;
let selectedId = null;

// view state
let orient = 'horizontal';   // 'horizontal' | 'vertical'
let moduleMode = 'x1';       // 'x1' | 'max'
let matsOpen = false;

// ----- init -----
initGraph();
applyFilters();
document.getElementById('stat').textContent =
  `${atlas.cards.length} cartas · ${atlas.edges.length} relaciones`;

// stage toolbar wiring
document.querySelectorAll('#seg-orient button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#seg-orient button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    orient = b.dataset.v;
    if (selectedId) renderCard(selectedId);
  });
});
document.getElementById('btn-mats').addEventListener('click', () => {
  matsOpen = !matsOpen;
  document.getElementById('mats-area').classList.toggle('open', matsOpen);
  document.getElementById('btn-mats').textContent =
    matsOpen ? 'ocultar diferenciales' : 'mostrar diferenciales';
  if (matsOpen && selectedId) renderMatrices(selectedId);
});
document.getElementById('btn-mats-close').addEventListener('click', () => {
  matsOpen = false;
  document.getElementById('mats-area').classList.remove('open');
  document.getElementById('btn-mats').textContent = 'mostrar diferenciales';
});

// ----- Cytoscape graph -----
function initGraph() {
  const els = [];
  for (const c of atlas.cards) {
    els.push({
      data: { id: c.id, label: c.I_str, n: c.n, gens: c.gens, family: c.family },
      classes: c.family,
    });
  }
  for (const e of atlas.edges) {
    els.push({
      data: { id: `${e.source}->${e.target}`, source: e.source, target: e.target, kind: e.kind },
      classes: e.kind,
    });
  }

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: els,
    layout: {
      name: 'preset',
      positions: (node) => {
        const c = atlas.cards.find(c => c.id === node.id());
        if (!c) return { x: 0, y: 0 };
        const baseX = (c.n - 1) * 130;
        const baseY = c.gens * 110;
        const samebin = atlas.cards.filter(d => d.n === c.n && d.gens === c.gens);
        const idx = samebin.indexOf(c);
        const total = samebin.length;
        const angle = (idx / Math.max(1,total)) * Math.PI * 2;
        const radius = Math.min(45, 6 * Math.sqrt(total));
        return {
          x: baseX + Math.cos(angle) * radius,
          y: baseY + Math.sin(angle) * radius * 0.5
        };
      }
    },
    style: [
      { selector: 'node', style: {
          'background-color': ele => FAMILY_COLOR[ele.data('family')] || '#888',
          'border-width': 1, 'border-color': '#222',
          'label': 'data(label)',
          'font-family': 'JetBrains Mono, monospace',
          'font-size': 8, 'color': '#9a9aa0',
          'text-margin-y': -8,
          'text-halign': 'center', 'text-valign': 'top',
          'width': ele => 10 + 2 * Math.min(8, ele.data('gens') * 2 + ele.data('n')),
          'height': ele => 10 + 2 * Math.min(8, ele.data('gens') * 2 + ele.data('n'))
        } },
      { selector: 'node:selected', style: {
          'border-color': '#c1a878', 'border-width': 3, 'color': '#c1a878'
        } },
      { selector: 'edge', style: {
          'width': 1, 'line-color': '#2e2e34',
          'curve-style': 'straight', 'opacity': 0.5,
          'target-arrow-shape': 'none'
        } },
      { selector: 'edge.subideal', style: { 'line-color': '#3a3a40', 'opacity': 0.5 } },
      { selector: 'edge.embed',    style: { 'line-color': '#5a4a30', 'line-style': 'dashed', 'opacity': 0.45 } },
      { selector: 'edge:selected', style: { 'line-color': '#c1a878', 'opacity': 1, 'width': 2 } }
    ],
    wheelSensitivity: 0.2, minZoom: 0.25, maxZoom: 4
  });

  cy.on('tap', 'node', evt => renderCard(evt.target.id()));
}

// ----- filters -----
['filter-n','filter-gens','filter-family'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});
function applyFilters() {
  const fn = document.getElementById('filter-n').value;
  const fg = document.getElementById('filter-gens').value;
  const ff = document.getElementById('filter-family').value;
  cy.batch(() => {
    cy.nodes().forEach(n => {
      const c = atlas.cards.find(c => c.id === n.id());
      const v = (fn==='all' || +fn===c.n) &&
                (fg==='all' || +fg===c.gens) &&
                (ff==='all' || ff===c.family);
      n.style('display', v ? 'element' : 'none');
    });
    cy.edges().forEach(e => {
      const s = cy.getElementById(e.data('source')).style('display');
      const t = cy.getElementById(e.data('target')).style('display');
      e.style('display', (s!=='none' && t!=='none') ? 'element' : 'none');
    });
  });
}

// ----- card render -----
function renderCard(id) {
  selectedId = id;
  cy.elements().unselect();
  cy.getElementById(id).select();
  const card = atlas.cards.find(c => c.id === id);
  if (!card) return;

  // Recompute CD with current module choice
  const initVars = moduleMode === 'x1'
    ? [1]
    : Array.from({length: card.n}, (_, i) => i + 1);
  const cd = CDCore.buildCD({
    n: card.n,
    relations: card.I,
    initVars,
    levels: 9
  });
  const betti = CDCore.bettiNumbers(cd).slice(0, 9);

  // ── module label in stage toolbar ──
  document.getElementById('module-label').innerHTML = moduleLabelHtml(card);

  // ── left panel ──
  const neighbors = atlas.edges
    .filter(e => e.source === id || e.target === id)
    .map(e => ({
      otherId: e.source === id ? e.target : e.source,
      kind: e.kind
    }));
  const neighborCards = neighbors
    .map(nb => ({ ...nb, card: atlas.cards.find(c => c.id === nb.otherId) }))
    .filter(x => x.card)
    .sort((a, b) => a.card.n - b.card.n || a.card.gens - b.card.gens);

  document.getElementById('meta').innerHTML = `
    <div class="card-title">${escapeHtml(formatTitle(card))}</div>
    <div class="card-sub">${card.id} · familia <span style="color:${FAMILY_COLOR[card.family]||'#888'}">${card.family}</span></div>

    <div class="toggle-row">
      <span class="label">módulo M</span>
      <div class="seg" id="seg-module">
        <button data-v="x1" ${moduleMode==='x1'?'class="active"':''}>R/(x₁)</button>
        <button data-v="max" ${moduleMode==='max'?'class="active"':''}>R/𝔪</button>
      </div>
    </div>

    <div class="kv">
      <div class="k">R</div><div class="v">${ringTeX(card)}</div>
      <div class="k">I</div><div class="v">${idealTeX(card)}</div>
      <div class="k">M</div><div class="v">${moduleTeX(card)}</div>
      <div class="k">|I|</div><div class="v">${card.gens}</div>
      <div class="k">d∘d=0</div><div class="v">${card.dd_zero ? '<span style="color:#4ea27a">verificado</span>' : '<span style="color:#c1440e">violación</span>'}</div>
    </div>

    <div class="section">
      <h3>Sucesión Betti</h3>
      <div class="betti-row">${betti.join(',&nbsp; ')}</div>
    </div>

    <div class="section">
      <h3>Cartas vecinas (${neighborCards.length})</h3>
      <div class="neighbors">
        ${neighborCards.slice(0, 16).map(x => `
          <div class="neighbor" data-id="${x.otherId}">
            <span class="nid">${escapeHtml(x.card.I_str)}</span>
            <span class="nmeta">n=${x.card.n}, |I|=${x.card.gens}</span>
          </div>`).join('')}
      </div>
    </div>
  `;

  // module toggle
  document.querySelectorAll('#seg-module button').forEach(b => {
    b.addEventListener('click', () => {
      moduleMode = b.dataset.v;
      renderCard(id);
    });
  });
  // neighbors
  document.querySelectorAll('#meta .neighbor').forEach(n =>
    n.addEventListener('click', () => renderCard(n.dataset.id)));

  // ── center stage: diagram ──
  const diagArea = document.getElementById('diag-area');
  diagArea.innerHTML = '';
  diagArea.appendChild(renderDiagramSVG(cd, orient));

  // matrices (only if open)
  if (matsOpen) renderMatrices(id);
}

function moduleLabelHtml(card) {
  const ring = card.gens === 0
    ? `k[x_1,\u2026,x_${card.n}]`
    : `k[x_1,\u2026,x_${card.n}]/I`;
  const mod = moduleMode === 'x1' ? 'R/(x_1)' : 'R/\u{1D52A}';
  return `<em>M</em> = <em>${mod}</em> &nbsp;sobre&nbsp; <em>R</em> = <em>${ring}</em>`;
}
function formatTitle(card) {
  const r = card.gens === 0 ? `k[x_1,…,x_${card.n}]` : `k[x_1,…,x_${card.n}]/I`;
  return `R = ${r}`;
}
function ringTeX(card) {
  return `<code>k[x_1,…,x_${card.n}]${card.gens===0 ? '' : '/I'}</code>`;
}
function idealTeX(card) {
  if (card.gens === 0) return '<code>∅</code>';
  return `<code>(${card.I.map(([a,b]) => `x_${a}x_${b}`).join(', ')})</code>`;
}
function moduleTeX(card) {
  if (moduleMode === 'x1') return `<code>R/(x_1)</code>`;
  return `<code>R/(x_1,…,x_${card.n})</code>`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// ----- diagram SVG -----
function renderDiagramSVG(cd, orientation) {
  const xmlns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(xmlns, 'svg');

  const NODE_R = 5;
  const COL = 110;     // along the "level" axis
  const ROW = 38;      // perpendicular (between nodes of same level)
  const PAD = 40;

  // determine non-empty levels
  let upto = cd.nodes.length;
  for (let i = 0; i < cd.nodes.length; i++) {
    if (!cd.nodes[i] || cd.nodes[i].length === 0) { upto = i; break; }
  }
  if (upto === 0) upto = 1;

  const maxNodes = Math.max(1, ...cd.nodes.slice(0, upto).map(l => l ? l.length : 0));

  // position function — orientation switches axes
  // horizontal: level along X (left→right), nodes along Y (centered)
  // vertical:   level along Y (bottom→top), nodes along X (centered)
  const pos = {};
  let W, H;
  if (orientation === 'horizontal') {
    W = PAD * 2 + (upto - 1) * COL + 40;
    H = PAD * 2 + Math.max(maxNodes, 1) * ROW;
    for (let g = 0; g < upto; g++) {
      const layer = cd.nodes[g] || [];
      const yCenter = H / 2;
      layer.forEach((node, k) => {
        const offset = (k - (layer.length - 1) / 2) * ROW;
        pos[node.id] = { x: PAD + g * COL, y: yCenter + offset };
      });
    }
  } else { // vertical, bottom-up
    W = PAD * 2 + Math.max(maxNodes, 1) * ROW;
    H = PAD * 2 + (upto - 1) * COL + 40;
    for (let g = 0; g < upto; g++) {
      const layer = cd.nodes[g] || [];
      const xCenter = W / 2;
      layer.forEach((node, k) => {
        const offset = (k - (layer.length - 1) / 2) * ROW;
        pos[node.id] = { x: xCenter + offset, y: H - PAD - g * COL };
      });
    }
  }

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.maxWidth = '100%';

  // arrows
  const totalNodes = cd.nodes.slice(0, upto).reduce((s, l) => s + (l ? l.length : 0), 0);
  const showLabels = totalNodes < 30;

  for (const a of cd.arrows) {
    const fromNode = cd.nodes[a.fromG]?.find(n => n.p === a.fromP);
    const toNode = cd.nodes[a.toG]?.find(n => n.p === a.toP);
    if (!fromNode || !toNode) continue;
    const p1 = pos[fromNode.id], p2 = pos[toNode.id];
    if (!p1 || !p2) continue;
    const col = varColor(a.idx);

    const line = document.createElementNS(xmlns, 'line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
    line.setAttribute('stroke', col);
    line.setAttribute('stroke-width', 1.25);
    if (a.sign === -1) line.setAttribute('stroke-dasharray', '4 2');
    line.setAttribute('opacity', '0.88');
    svg.appendChild(line);

    if (showLabels) {
      const lab = document.createElementNS(xmlns, 'text');
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy);
      const nx = -dy / len, ny = dx / len;
      lab.setAttribute('x', (p1.x + p2.x)/2 + nx * 6);
      lab.setAttribute('y', (p1.y + p2.y)/2 + ny * 6 + 3);
      lab.setAttribute('fill', col);
      lab.setAttribute('font-family', 'JetBrains Mono, monospace');
      lab.setAttribute('font-size', '9');
      lab.setAttribute('text-anchor', 'middle');
      lab.textContent = (a.sign===-1?'−':'') + 'x' + a.idx;
      svg.appendChild(lab);
    }
  }

  // nodes
  for (let g = 0; g < upto; g++) {
    const layer = cd.nodes[g] || [];
    layer.forEach(node => {
      const p = pos[node.id];
      const c = document.createElementNS(xmlns, 'circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
      c.setAttribute('r', NODE_R);
      c.setAttribute('fill', '#e8e8ec');
      c.setAttribute('stroke', '#0e0e10');
      c.setAttribute('stroke-width', '1');
      svg.appendChild(c);
    });
    // degree label
    const lab = document.createElementNS(xmlns, 'text');
    if (orientation === 'horizontal') {
      lab.setAttribute('x', PAD + g * COL);
      lab.setAttribute('y', H - 14);
    } else {
      lab.setAttribute('x', 18);
      lab.setAttribute('y', H - PAD - g * COL + 4);
    }
    lab.setAttribute('text-anchor', 'middle');
    lab.setAttribute('fill', '#7a7a80');
    lab.setAttribute('font-family', 'JetBrains Mono, monospace');
    lab.setAttribute('font-size', '10');
    lab.textContent = `F${g}`;
    svg.appendChild(lab);
  }

  return svg;
}

// ----- matrices with colored terms -----
function renderMatrices(id) {
  const card = atlas.cards.find(c => c.id === id);
  if (!card) return;
  const initVars = moduleMode === 'x1'
    ? [1]
    : Array.from({length: card.n}, (_, i) => i + 1);
  const cd = CDCore.buildCD({ n: card.n, relations: card.I, initVars, levels: 9 });
  const mats = CDCore.buildMatrices(cd);
  const body = document.getElementById('mats-body');
  body.innerHTML = '';
  mats.forEach((M, idx) => {
    if (!M) return;
    const g = idx + 1;
    if (!cd.nodes[g] || cd.nodes[g].length === 0) return;
    const block = document.createElement('div');
    block.className = 'matrix-block';
    block.innerHTML = `<div class="mlabel">d_${g} : F_${g} → F_${g-1}  &nbsp;(${M.length}×${M[0]?.length||0})</div>`;
    if (M.length === 0 || M[0].length === 0) {
      block.innerHTML += '<em style="color:#666">(vacío)</em>';
    } else {
      const tbl = document.createElement('table');
      for (const row of M) {
        const tr = document.createElement('tr');
        for (const cell of row) {
          const td = document.createElement('td');
          td.innerHTML = coloredEntry(cell);
          tr.appendChild(td);
        }
        tbl.appendChild(tr);
      }
      block.appendChild(tbl);
    }
    body.appendChild(block);
  });
}

function coloredEntry(cell) {
  if (!cell || cell.length === 0) return '<span style="color:#555">0</span>';
  return cell.map((t, i) => {
    const sign = t.sign === -1 ? '−' : (i === 0 ? '' : '+');
    return `<span class="mterm" style="color:${varColor(t.idx)}">${sign}x<sub>${t.idx}</sub></span>`;
  }).join(' ');
}
